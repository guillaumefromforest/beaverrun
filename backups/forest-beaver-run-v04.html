<body>
<div id="gameWrapper">
  <div id="hud">
    <span id="levelLabel" class="level-badge">LEVEL 1</span>
    <span id="scoreLabel">SCORE: 0</span>
    <span id="pineLabel">-----</span>
    <span id="livesLabel">❤ ❤ ❤</span>
  </div>
  <canvas id="c" width="900" height="280"></canvas>
  <div id="overlay"></div>
</div>

<script>
const BG = '#DDF327', FG = '#3F5B1E';
const W = 900, H = 280, GROUND = H - 48; // 232
const CELL = 2; // 2px per virtual pixel — finer detail than before

// ─── BEAVER SPRITE ────────────────────────────────────────────────────────────
// Three matrices — user-designed pixel art:
//   BEAVER 1A (20×15): tail STRAIGHT — run frame A / jump
//   BEAVER 1B (20×15): tail LEANING LEFT — run frame B (legs closer together)
//   BEAVER 2  (20×8) : tail horizontal, jaw OPEN — bite chewPhase 1
//   BEAVER 3  (20×8) : tail horizontal, jaw CLOSED — bite chewPhase 0
//
// Run animation: legA=true → frame A (tail straight, legs spread cols 8-9/14-15)
//                legA=false → frame B (tail leans left, legs together cols 9-10/13-14)
// Body always at rows 9-12, cols 7-18. Eye hole at row 10 col 17.

function drawBeaverShape(ctx, ox, oy, frame, state) {
  const P = BV_CELL;
  const f = (c,r,w,h) => { ctx.fillStyle=FG; ctx.fillRect(ox+c*P, oy+r*P, (w||1)*P, (h||1)*P); };
  const e = (c,r,w,h) => { ctx.fillStyle=BG; ctx.fillRect(ox+c*P, oy+r*P, (w||1)*P, (h||1)*P); };

  if (state === 'bite') {
    // ── BEAVER 2 / 3: horizontal tail, 20×8 ────────────────────────────────
    const chewPhase = Math.floor(frame / 10) % 2;
    f(1, 0, 6, 2);   // horizontal tail rows 0-1, cols 1-6
    f(15, 1);         // ear
    f(19, 1);         // tooth
    f(7, 2, 12, 4);  // body rows 2-5, cols 7-18
    e(17, 3);         // eye
    f(8, 6); f(8, 7, 2, 1);   // left leg
    f(14, 6); f(14, 7, 2, 1); // right leg
    if (chewPhase === 1) f(18, 6);  // jaw open extra pixel

  } else {
    // ── BEAVER 1A / 1B: upright tail, 20×15 ────────────────────────────────
    const legA = Math.floor(frame/7) % 2 === 0;

    // ── Tail ──
    if (state === 'swim') {
      // 4-phase stroke: upright → angling → horizontal → angling back
      const sp = Math.floor(frame / 8) % 4;
      if (sp === 0 || sp === 3) {
        f(5, 2, 2, 7);                                        // fully upright (frame A shape)
      } else if (sp === 1) {
        f(5, 2); f(4, 3, 2, 3); f(4, 6, 3, 1); f(5, 7, 2, 2); // angling (frame B shape)
      } else {
        // horizontal power stroke — swing further left
        f(5, 2, 2, 2); f(3, 4, 3, 1); f(2, 5, 4, 1); f(1, 6, 5, 2);
      }
    } else if (legA || state === 'jump') {
      // Frame A: tail straight up, rows 2-8, cols 5-6
      f(5, 2, 2, 7);
    } else {
      // Frame B: tail leans left
      f(5, 2);            // tip: row 2, col 5 only
      f(4, 3, 2, 3);      // rows 3-5, cols 4-5 (leaning left)
      f(4, 6, 3, 1);      // row 6, cols 4-6 (bend)
      f(5, 7, 2, 2);      // rows 7-8, cols 5-6 (back to centre)
    }

    // ── Ear: row 8, col 15 ──
    f(15, 8);
    // ── Snout tip: col 19 (frame A/jump) or col 18 (frame B) ──
    f((state === 'run' && !legA) ? 18 : 19, 8);
    // ── Body: rows 9-12, cols 7-18 ──
    f(7, 9, 12, 4);
    // ── Eye: BG dot at row 10, col 17 ──
    e(17, 10);
    // ── Snout lower: row 13, col 18 ──
    f(18, 13);

    // ── Legs ──
    if (state === 'jump') {
      // Slightly tucked — just a small stub each side
      f(9, 13, 2, 1); f(13, 13, 2, 1);
    } else if (state === 'run') {
      if (legA) {
        // Frame A: legs spread (cols 8-9 and 14-15)
        f(8, 13); f(8, 14, 2, 1);
        f(14, 13); f(14, 14, 2, 1);
      } else {
        // Frame B: legs together (cols 9-10 and 13-14)
        f(9, 13); f(9, 14, 2, 1);
        f(13, 13); f(13, 14, 2, 1);
      }
    } else if (state === 'swim') {
      if (legA) { f(8, 13, 2, 1); f(14, 13, 2, 1); }
      else       { f(9, 13, 2, 1); f(13, 13, 2, 1); }
    }
  }
}

function drawBeaver(ctx, x, y, frame, state) {
  drawBeaverShape(ctx, x, y, frame, state);
}

function drawDeadBeaver(ctx, ox, oy) {
  const P = BV_CELL;
  const f = (c,r,w,h) => { ctx.fillStyle=FG; ctx.fillRect(ox+c*P, oy+r*P, (w||1)*P, (h||1)*P); };
  const e = (c,r,w,h) => { ctx.fillStyle=BG; ctx.fillRect(ox+c*P, oy+r*P, (w||1)*P, (h||1)*P); };
  // Row 5: paws raised (2-wide each)
  f(8, 5, 2); f(14, 5, 2);
  // Row 6: paw lower tips + snout tip
  f(8, 6); f(14, 6); f(18, 6);
  // Rows 7-8: body block
  f(7, 7, 12); f(7, 8, 12);
  // Row 9: flat tail left + body + snout detail
  f(1, 9, 5); f(7, 9, 10); f(18, 9);
  // Row 10: full spread (tail meets body)
  f(1, 10, 19);
  // Eye — single hollow pixel on the head (right end of body)
  e(16, 8);
}

// ─── FIR TREE SPRITE ──────────────────────────────────────────────────────────
// 14 cols × 36 rows = 28×72px. Taller trunk so it can't be jumped over.
// Pivot for falling = trunk base (col 7, row 36).

function drawFir(ctx, x, y, falling, fallAngle, biteProgress) {
  biteProgress = biteProgress || 0;
  ctx.save();
  if (falling) {
    const px = x + 7 * CELL;   // trunk centre x
    const py = GROUND;          // trunk base y
    ctx.translate(px, py);
    ctx.rotate(fallAngle);
    ctx.translate(-px, -py);
  }

  ctx.fillStyle = FG;
  const P = CELL;
  const row = (r, c0, len) => ctx.fillRect(x + c0*P, y + r*P, len*P, P);

  // TIP
  row( 0,  6, 2);

  // UPPER TIER (rows 1–8)
  row( 1,  5, 4);
  row( 2,  4, 6);
  row( 3,  3, 8);
  row( 4,  5, 4);  // step in
  row( 5,  4, 6);
  row( 6,  3, 8);
  row( 7,  2,10);
  row( 8,  4, 6);  // step in

  // MID TIER (rows 9–16)
  row( 9,  3, 8);
  row(10,  2,10);
  row(11,  1,12);
  row(12,  0,14);
  row(13,  2,10); // step in
  row(14,  1,12);
  row(15,  0,14);
  row(16,  2,10); // step in

  // LOWER TIER (rows 17–19)
  row(17,  1,12);
  row(18,  0,14);
  row(19,  1,12);

  // TRUNK (rows 20–35): lower third narrows from the LEFT (beaver side) as it chomps
  for (let r = 20; r < 36; r++) {
    let c0 = 5, len = 4;
    if (biteProgress > 0 && r >= 29) {
      // Lower third (rows 29-35): left edge eaten inward by the beaver
      const rowFrac = (r - 29) / 6;          // 0 at row 29, 1 at row 35
      const chewed = Math.floor(biteProgress * rowFrac * 3);  // 0-3 cols eaten
      c0  = 5 + chewed;
      len = Math.max(1, 4 - chewed);
    }
    row(r, c0, len);
  }

  // Flying wood chips — burst to the RIGHT (open space, not blocked by beaver)
  if (biteProgress > 0) {
    for (let i = 0; i < 6; i++) {
      const t = (frame * 2 + i * 11) % 36;
      if (t < 22) {
        const age = t / 22;
        const cx = x + 5*P + (1 + i) * age * 6;                           // fly right
        const cy = y + 30*P - (1 + i % 3) * age * 5 + age * age * 8;     // arc up then fall
        ctx.fillRect(Math.round(cx), Math.round(cy), P, P);
      }
    }
  }

  ctx.restore();
}

// ─── LOG SPRITE ───────────────────────────────────────────────────────────────
// 22 cols × 5 rows = 44×10px. log.y = GROUND - 5*CELL

function drawLog(ctx, x, y) {
  const P = CELL;
  const row = (r, c0, len) => { ctx.fillStyle=FG; ctx.fillRect(x+c0*P, y+r*P, len*P, P); };
  const dot = (c, r)        => { ctx.fillStyle=BG; ctx.fillRect(x+c*P,  y+r*P, P,     P); };

  // Log body
  row(0,  1, 20);
  row(1,  0, 22);
  row(2,  0, 22);
  row(3,  0, 22);
  row(4,  1, 20);

  // Left end-grain rings
  dot(1, 1); dot(1, 3);
  dot(2, 2);

  // Right end-grain rings
  dot(20, 1); dot(20, 3);
  dot(19, 2);

  // Bark knots across body
  dot(5, 0); dot(11, 0); dot(16, 0);
  dot(6, 4); dot(12, 4); dot(17, 4);
}

// ─── RIVER ────────────────────────────────────────────────────────────────────
function drawRiver(ctx, x, w, waveOffset) {
  ctx.fillStyle = FG;
  ctx.fillRect(x, GROUND, w, H - GROUND);  // river flush with ground, fills to canvas bottom
  ctx.fillStyle = BG;
  for (let i = 0; i < w; i += 24) {
    const wx = x + i + (waveOffset % 24);
    ctx.fillRect(wx, GROUND + 6, 11, 4);
    ctx.fillRect(wx + 10, GROUND + 20, 11, 4);
  }
}

// ─── CLOUD ────────────────────────────────────────────────────────────────────
function drawCloud(ctx, x, y) {
  const P = CELL;
  const f = (c,r,w,h) => { ctx.fillStyle=FG; ctx.fillRect(x+c*P, y+r*P, (w||1)*P, (h||1)*P); };
  f(2,0,3,1);
  f(1,1,5,1);
  f(0,2,7,2);
  f(1,4,5,1);
}

// ─── GRASS ────────────────────────────────────────────────────────────────────
function drawGrass(ctx, x, y) {
  const P = CELL;
  ctx.fillStyle = FG;
  ctx.fillRect(x,      y,     P, P*2);
  ctx.fillRect(x+P*2,  y-P,   P, P*3);
  ctx.fillRect(x+P*4,  y,     P, P*2);
  ctx.fillRect(x+P*6,  y-P,   P, P*2);
}

// ─── BEAVER HUT ───────────────────────────────────────────────────────────────
// 20 cols × 12 rows = 40×24px at CELL=2.  Entry hole on left (cols 0-4, rows 6-9).
function drawHut(ctx, x, y) {
  const P = CELL;
  const f = (c,r,w,h) => { ctx.fillStyle=FG; ctx.fillRect(x+c*P, y+r*P, (w||1)*P, (h||1)*P); };
  const e = (c,r,w,h) => { ctx.fillStyle=BG; ctx.fillRect(x+c*P, y+r*P, (w||1)*P, (h||1)*P); };
  // Dome — widening row by row
  f(6, 0,  8, 1);
  f(4, 1, 12, 1);
  f(2, 2, 16, 1);
  f(1, 3, 18, 1);
  f(0, 4, 20, 8);  // full body rows 4-11
  // Entry hole — left side, rows 6-9
  e(0, 6, 5, 4);
  // Stick/log texture
  e(8, 0); e(11, 1); e(6, 2); e(15, 2); e(3, 3); e(17, 3);
  e(9, 4); e(14, 5); e(7, 7); e(18, 7); e(12, 8); e(6, 9);
  e(16, 10); e(10, 11); e(7, 4);
  // Branches / logs sticking out (beaver lodge = pile of sticks)
  f(20, 5, 4, 1);          // right stub row 5, 4 cells out
  f(20, 8, 3, 1);          // right stub row 8, 3 cells out
  f(20, 10, 5, 1);         // right long stub row 10
  f(-3, 7, 3, 1);          // left stub row 7
  f(-4, 10, 4, 1);         // left long stub row 10
  f(10, -3, 1, 3);         // vertical stick poking from dome top
  f(7,  -2, 1, 2);         // shorter stick left of center
  f(13, -1, 1, 2);         // short stick right of center
  // Branch tips (single cell at ends to make them look like cut logs)
  f(24, 4); f(24, 6);      // right side tip clusters
  f(-4, 6); f(-5, 9);      // left side tip clusters
}

// ─── AUDIO ────────────────────────────────────────────────────────────────────
let audioCtx = null;

function ensureAudio() {
  const justCreated = !audioCtx;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (justCreated && gameState === 'title') { sfxTitle(); return true; }
  return false;
}

function _beep(freq0, freq1, dur, vol, type) {
  if (!audioCtx) return;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = type || 'square';
  const t = audioCtx.currentTime;
  osc.frequency.setValueAtTime(freq0, t);
  if (freq1 !== freq0) osc.frequency.linearRampToValueAtTime(freq1, t + dur);
  gain.gain.setValueAtTime(vol || 0.3, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t); osc.stop(t + dur);
}

function _seq(notes, vol) {
  if (!audioCtx) return;
  let t = audioCtx.currentTime;
  for (const [freq, dur] of notes) {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol || 0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.start(t); osc.stop(t + dur);
    t += dur;
  }
}

function sfxStep()     { _beep(70,  50,  0.04, 0.07); }
function sfxJump()     { _beep(180, 540, 0.15, 0.25); }
function sfxChomp()    { _beep(110, 55,  0.07, 0.2 ); }
function sfxHit()      { _beep(280, 80,  0.25, 0.3 ); }
function sfxLifeLost() { _seq([[400, 0.12], [300, 0.12], [180, 0.25]], 0.3); }
function sfxTitle() {
  if (!audioCtx) return;
  const beat = 0.22;
  const notes = [[523.25,beat/2],[523.25,beat/2],[493.88,beat],[0,beat/2],[523.25,beat/2],[0,beat]];
  let t = audioCtx.currentTime + 0.05;
  for (const [freq, dur] of notes) {
    if (freq > 0) {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.20, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.start(t); osc.stop(t + dur);
    }
    t += dur;
  }
}
function sfxGameOver() {
  if (!audioCtx) return;
  const beat = 0.22;
  const notes = [
    [523.25, beat/2],  // C
    [523.25, beat/2],  // C
    [493.88, beat  ],  // B
    [523.25, beat  ],  // C
    [493.88, beat  ],  // B
    [415.30, beat  ],  // G#
    [392.00, beat  ],  // G
    [369.99, beat*2],  // F# — rings out
  ];
  let t = audioCtx.currentTime + 0.05;
  const lastIdx = notes.length - 1;
  for (let i = 0; i < notes.length; i++) {
    const [freq, dur] = notes[i];
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.20, t);
    if (i === lastIdx) {
      gain.gain.setValueAtTime(0.20, t + dur * 0.5);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur + 1.2);
      osc.start(t); osc.stop(t + dur + 1.3);
    } else {
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.start(t); osc.stop(t + dur);
    }
    t += dur;
  }
}
function sfxBonus()    { _seq([[350, 0.07], [450, 0.07], [550, 0.07], [750, 0.12]], 0.25); }
function sfxLifeUp()   { _seq([[300, 0.07], [400, 0.07], [600, 0.07], [800, 0.18]], 0.3); }

function sfxSplash() {
  if (!audioCtx) return;
  const bufLen = Math.floor(audioCtx.sampleRate * 0.12);
  const buf  = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
  const src    = audioCtx.createBufferSource();
  const filter = audioCtx.createBiquadFilter();
  const gain   = audioCtx.createGain();
  src.buffer = buf;
  filter.type = 'highpass'; filter.frequency.value = 1200;
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  src.start();
}

function stopVictoryMusic() {
  if (victoryMusicTimeout) { clearTimeout(victoryMusicTimeout); victoryMusicTimeout = null; }
}

function _scheduleVictoryLoop() {
  const beat = 0.22;
  const C=523.25, B=493.88, F5=698.46, E5=659.25, F4=349.23, E4=329.63;
  const line1  = [[C,beat/2],[C,beat/2],[B,beat],[0,beat/2],[C,beat/2],[0,beat]];
  const line2a = [[F5,beat/2],[F5,beat/2],[E5,beat],[0,beat/2],[F5,beat/2],[0,beat]];
  const line2b = [[F4,beat/2],[F4,beat/2],[E4,beat],[0,beat/2],[F4,beat/2],[0,beat]];
  const notes = [...line1, ...(victoryPass % 2 === 0 ? line2a : line2b)];
  let t = victoryEndTime;
  for (const [freq, dur] of notes) {
    if (freq > 0) {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.20, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.start(t); osc.stop(t + dur);
    }
    t += dur;
  }
  victoryEndTime = t;
  const totalDur = notes.reduce((s,[,d]) => s+d, 0);
  victoryPass++;
  victoryMusicTimeout = setTimeout(_scheduleVictoryLoop, (totalDur - 0.12) * 1000);
}

function sfxVictory() {
  if (!audioCtx) return;
  stopVictoryMusic();
  victoryPass = 0;
  victoryEndTime = audioCtx.currentTime + 0.05;
  _scheduleVictoryLoop();
}

// ─── GAME STATE ───────────────────────────────────────────────────────────────
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

let gameState = 'title';
let level = 1, score = 0, lives = 3, hiScore = 0;
let frame = 0, speed = 2.5;
let worldPaused = false;
let levelStartScore = 0;

const BV_H = 15;      // BEAVER 1: 15 rows tall (rows 0-14, feet at row 14)
const BV_H_BITE = 8;  // BEAVER 2/3: 8 rows tall
const BV_CELL = 3;    // beaver sprite pixel size (larger than world sprites)
const FIR_H = 36; // tall enough that it cannot be jumped over
const LOG_H = 5;

const bv = {
  x: 80,
  y: GROUND - BV_H * BV_CELL,
  vy: 0,
  state: 'run',
  biteTimer: 0,
  invincible: 0,
  _riverDecay: 0,
  _swimProgress: 0,  // px swum through current river
};

let obstacles  = [];
let clouds     = [];
let grassTufts = [];
let spawnTimer = 80;
let waveOffset = 0;

let riverActive    = false;
let riverAlternate = 0;
let lastRiverKey   = '';
let activeFir      = null;
let currentRiver   = null;  // river obstacle currently being swum
let riverTimer     = 0;     // total frames in current river crossing
let lastStrokeFrame = -100; // frame number of last valid swim stroke (for splash)
let lastTailStroke  = -100; // frame when tail hit horizontal phase (for splash visual)
let prevFrame       = 0;    // frame value from previous update (for diff-based sound detection)
let speedTimer      = 0;    // replaces frame%500 speed ramp
let hudTimer        = 0;    // replaces frame%30 HUD throttle
let lastTime        = 0;    // timestamp of previous rAF call (for delta-time)
let pinecones       = 0;    // perfect-chomp pinecone counter
let spawnCounts     = {};   // obstacle type counts this level (for 20% min enforcement)
let winAnimInterval = null; // setInterval handle for win-screen beaver animation
let finaleTriggered = false; // true once finale river has been spawned in level 3
let finaleTimer     = 0;    // counts up during finaleEntering state
let finaleHutX      = 0;    // canvas x of hut (set when finaleEntering begins)
let victoryMusicTimeout = null;
let victoryEndTime  = 0;
let victoryPass     = 0;
let floatingHearts  = [];   // hearts that fly up on life loss
let floatingTexts   = [];   // bonus text labels that rise and fade
let dustParticles   = [];   // ground dust puffs on jump takeoff
let dyingTimer      = 0;    // counts down before showing OUCH screen
let bvVisualOffset  = 0;    // smooth x offset after river crossing (slides back to 0)

// ─── KEYS ─────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  const prev = keys[e.code];
  keys[e.code] = true;
  if (!prev) onKeyDown(e.code);
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function cheatToLevel(lvl) {
  level = lvl; lives = 3; score = 0;
  worldPaused = false;
  stopVictoryMusic();
  if (activeFir) { activeFir.chomping = false; activeFir = null; }
  gameState = 'levelIntro';
  showLevelIntro(lvl);
}

function cheatToFinale() {
  stopVictoryMusic();
  level = 3; lives = 3; score = 0;
  startLevel(3);
  // Immediately place the finale river on screen, ready to swim
  finaleTriggered = true;
  spawnTimer = 9999;
  obstacles = [{ type:'river', x: W + 20, w: 420, passed: false, finale: true }];
}

function onKeyDown(code) {
  if (ensureAudio()) return; // first-ever keypress bootstrapped audio on title screen — absorb it
  // Cheat codes: A/B/C skip to level 1/2/3 from anywhere
  if (code === 'KeyA') { cheatToLevel(1); return; }
  if (code === 'KeyB') { cheatToLevel(2); return; }
  if (code === 'KeyC') { cheatToLevel(3); return; }
  if (code === 'KeyV') { cheatToFinale(); return; }

  // Pause / resume with Space during play
  if (code === 'Space' && gameState === 'playing') {
    gameState = 'paused';
    showOverlay(`<h1>PAUSED</h1><div class="hint">Press <span class="key-pill">SPACE</span> to resume</div>`);
    return;
  }
  if ((code === 'Space' || code === 'Enter') && gameState === 'paused') {
    gameState = 'playing';
    hideOverlay();
    return;
  }

  if (gameState === 'dying') return;  // ignore input during death animation
  if (['title','levelIntro','dead','win'].includes(gameState)) {
    if (code === 'Space' || code === 'Enter') { startOrAdvance(); return; }
  }
  if (gameState === 'finaleEntering' && finaleTimer > 50) {
    gameState = 'win';
    showWin(true);
    return;
  }
  if (gameState !== 'playing') return;

  if (code === 'ArrowUp' && bv.state === 'run') {
    bv.vy = -10;
    bv.state = 'jump';
    sfxJump();
    // Dust burst at beaver's feet
    for (let i = 0; i < 7; i++) {
      dustParticles.push({
        x: bv.x + (3 + i * 2) * BV_CELL,
        y: GROUND - 1,
        dx: (i - 3) * 0.9,
        dy: -1.2 - (i % 3) * 0.4,
        t: 0,
      });
    }
  }

  if (code === 'ArrowDown' && bv.state === 'run' && bv.invincible === 0) {
    const nearFir = obstacles.find(o =>
      o.type === 'fir' && !o.chomping && !o.falling &&
      o.x - bv.x > 0 && o.x - bv.x < 110
    );
    if (nearFir) {
      bv.state     = 'bite';
      bv.biteTimer = 72;   // ~1.2 seconds of chewing
      bv.y         = GROUND - BV_H_BITE * BV_CELL;
      activeFir    = nearFir;
      nearFir.chomping = true;
      worldPaused  = true;
    }
  }

  if (code === 'ArrowLeft' || code === 'ArrowRight') {
    if (riverActive && bv.state === 'swim') {
      const dir = code === 'ArrowLeft' ? 'left' : 'right';
      // Anti-cheat: both arrow keys held simultaneously don't count as alternation
      const bothHeld = keys['ArrowLeft'] && keys['ArrowRight'];
      if (dir !== lastRiverKey && !bothHeld) { lastRiverKey = dir; riverAlternate++; }
    }
  }
}

  const bc = document.getElementById('bvWin');
  const bctx = bc.getContext('2d');
  // 2-frame animation: run pose (legged, ground) ↔ jump pose (airborne, higher)
  let phase = 0;

    bctx.fillStyle = BG; bctx.fillRect(0, 0, 62, 50);
    if (phase === 0) {
      drawBeaverShape(bctx, 0, 4, 0, 'run');   // legs planted
    } else {
      drawBeaverShape(bctx, 0, 0, 0, 'jump');  // airborne
    }
    phase = 1 - phase;
  }
  drawWinFrame();
  winAnimInterval = setInterval(drawWinFrame, 420);
}

function startOrAdvance() {
  if (gameState === 'title') {
    level = 1; score = 0; lives = 3; pinecones = 0;
    gameState = 'levelIntro'; showLevelIntro(level); return;
  }
  if (gameState === 'levelIntro') { startLevel(level); return; }
  if (gameState === 'dead') {
    if (lives > 0) { gameState = 'levelIntro'; showLevelIntro(level); }
    else { level=1; score=0; lives=3; pinecones=0; gameState='title'; showTitle(); }
    return;
  }
  if (gameState === 'win') {
    stopVictoryMusic();
    level=1; score=0; lives=3; pinecones=0; gameState='title'; showTitle();
  }
}

// ─── SPAWN ────────────────────────────────────────────────────────────────────
// Varied spacing: 20% close duo (30-55 frames), 55% normal (105-160), 25% breather (185-260)
function randomSpawnDelay() {
  const r = Math.random();
  if (r < 0.20) return 30 + Math.random() * 25;
  if (r < 0.75) return 105 + Math.random() * 55;
  return 185 + Math.random() * 75;
}

function spawnObstacle() {
  const allowed = LEVEL_DATA[level-1].obstacles;
  let pool = [...allowed];
  // Level 3: rivers appear as often as any other obstacle (1-in-3 chance)
  if (pool.includes('river')) { pool = ['fir', 'log', 'river']; }

  // Enforce ≥20% per type: after 5 spawns, restrict pool to deficit types if any
  const total = Object.values(spawnCounts).reduce((a, b) => a + b, 0);
  if (total >= 5) {
    const deficitTypes = pool.filter(t => (spawnCounts[t] || 0) / total < 0.20);
    if (deficitTypes.length > 0) pool = deficitTypes;
  }

  const type = pool[Math.floor(Math.random() * pool.length)];
  spawnCounts[type] = (spawnCounts[type] || 0) + 1;

  if (type === 'fir') {
    obstacles.push({ type:'fir', x: W+20, y: GROUND - FIR_H*CELL,
      falling:false, chomping:false, fallAngle:0, done:false });
    spawnTimer = randomSpawnDelay();
  } else if (type === 'log') {
    obstacles.push({ type:'log', x: W+20, y: GROUND - LOG_H*CELL });
    spawnTimer = randomSpawnDelay();
  } else if (type === 'river') {
    const rw = 200 + Math.random()*60; // width = required swim distance (~14-18 strokes)
    obstacles.push({ type:'river', x: W+20, w: rw, passed: false });
    spawnTimer = 200 + Math.random()*80;  // rivers always need breathing room
  }
}

// ─── COLLISION ────────────────────────────────────────────────────────────────
function beaverRect() {
  if (bv.state === 'bite') {
    // BEAVER 2/3: body at cols 7-18, rows 2-5
    return { x: bv.x + 7*BV_CELL, y: bv.y + 2*BV_CELL, w: 12*BV_CELL, h: 4*BV_CELL };
  }
  // BEAVER 1: body at cols 7-18, rows 9-12
  return { x: bv.x + 7*BV_CELL, y: bv.y + 9*BV_CELL, w: 12*BV_CELL, h: 4*BV_CELL };
}
function overlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function hitObstacle() {
  if (bv.invincible > 0) return;
  hiScore = Math.max(hiScore, score);
  sfxHit();
  floatingHearts.push({ x: bv.x + 9*BV_CELL, y: bv.y + 9*BV_CELL, t: 0 });

  // Pinecone shield: 5 saved cones absorb the hit, no life lost
  if (pinecones >= 5) {
    pinecones = 0;
    floatingTexts.push({ text: '★ SAVED! ★', x: bv.x - 6, y: bv.y - 22, t: 0 });
    sfxLifeUp();
    updateHUD();
    bv.invincible    = 120;
    bv.state         = 'run';
    bv.y             = GROUND - BV_H * BV_CELL;
    bv.vy            = 0;
    riverActive      = false;
    worldPaused      = false;
    bv._swimProgress = 0;
    bvVisualOffset   = 0;
    if (currentRiver) { currentRiver.passed = true; currentRiver = null; }
    riverTimer = 0;
    if (activeFir) { activeFir.chomping = false; activeFir = null; }
    return;
  }

  lives--;
  updateHUD();
  if (lives <= 0) {
    sfxLifeLost();
    gameState = 'dying';   // allow heart animation to play for 1s first
    worldPaused = false;
    dyingTimer  = 60;      // 60 frames ≈ 1 second before OUCH overlay
  } else {
    bv.invincible    = 120;
    bv.state         = 'run';
    bv.y             = GROUND - BV_H * BV_CELL;
    bv.vy            = 0;
    riverActive      = false;
    worldPaused      = false;
    bv._swimProgress = 0;
    bvVisualOffset   = 0;
    if (currentRiver) { currentRiver.passed = true; currentRiver = null; }
    riverTimer = 0;
    if (activeFir) { activeFir.chomping = false; activeFir = null; }
  }
}

// ─── ENVIRONMENT ──────────────────────────────────────────────────────────────
function initEnvironment() {
  clouds = [];
  grassTufts = [];
  for (let i = 0; i < 6; i++)
    clouds.push({ x: Math.random()*W, y: 18 + Math.random()*55, speed: 0.35 + Math.random()*0.35 });
  for (let i = 0; i < 16; i++)
    grassTufts.push({ x: Math.random()*W });
}
initEnvironment();

// ─── UPDATE ───────────────────────────────────────────────────────────────────
// dt = elapsed time normalised to 60 fps (1.0 = exactly 60 fps, 2.0 = 30 fps).
// All movement, timers and physics are multiplied by dt so the game runs at a
// consistent real-time speed regardless of the display refresh rate or power mode.
function update(dt) {
  // These run regardless of game state (hearts fly, death delay ticks)
  for (let i = floatingHearts.length - 1; i >= 0; i--) {
    floatingHearts[i].t += dt;
    floatingHearts[i].y -= 0.9 * dt;
    if (floatingHearts[i].t > 120) floatingHearts.splice(i, 1);
  }
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].t += dt;
    floatingTexts[i].y -= 0.6 * dt;
    if (floatingTexts[i].t > 90) floatingTexts.splice(i, 1);
  }
  for (let i = dustParticles.length - 1; i >= 0; i--) {
    const d = dustParticles[i];
    d.t += dt; d.x += d.dx * dt; d.y += d.dy * dt; d.dy += 0.12 * dt;
    if (d.t > 22) dustParticles.splice(i, 1);
  }
  if (dyingTimer > 0) {
    dyingTimer -= dt;
    if (dyingTimer <= 0) { gameState = 'dead'; showDead(); }
  }

  // ── Finale entering: beaver fades into hut; wait for SPACE ──
  if (gameState === 'finaleEntering') {
    finaleTimer += dt;
    return;
  }

  if (gameState !== 'playing') return;

  prevFrame = frame;
  frame += dt;

  // ── Step sound: fires on each leg-phase flip while running ──
  if (bv.state === 'run' && !worldPaused) {
    const legNow  = Math.floor(frame / 7) % 2;
    const legPrev = Math.floor(prevFrame / 7) % 2;
    if (legNow !== legPrev) sfxStep();
  }
  // ── Chomp sound: fires each time jaw opens (chewPhase → 1) ──
  if (bv.state === 'bite') {
    const chewNow  = Math.floor(frame / 10) % 2;
    const chewPrev = Math.floor(prevFrame / 10) % 2;
    if (chewNow === 1 && chewPrev !== 1) sfxChomp();
  }

  if (!worldPaused) {
    score += dt;
    if (score > hiScore) hiScore = score;
    hudTimer += dt;
    if (hudTimer >= 30) { hudTimer -= 30; updateHUD(); }
    waveOffset += 2 * dt;
    speedTimer += dt;
    if (speedTimer >= 500) { speedTimer -= 500; speed = Math.min(speed + 0.25, 9); }
    spawnTimer -= dt;
    if (spawnTimer <= 0) spawnObstacle();
  }

  // ── Beaver physics ──
  if (bv.state === 'jump') {
    bv.vy += 0.65 * dt;
    bv.y  += bv.vy * dt;
    if (bv.y >= GROUND - BV_H*BV_CELL) {
      bv.y = GROUND - BV_H*BV_CELL;
      bv.vy = 0;
      bv.state = 'run';
    }
  }

  // ── Bite / chew timer ──
  if (bv.state === 'bite') {
    bv.biteTimer -= dt;
    if (bv.biteTimer <= 0) {
      if (activeFir) {
        // Perfect chomp: snout just before the trunk (not past it, not too far)
        // Beaver snout at bv.x+48, trunk front at fir.x+10 → gap = fir.x - bv.x - 38
        const dist = activeFir.x - bv.x;
        if (dist >= 38 && dist <= 68) {
          floatingTexts.push({ text: 'PERFECT! *', x: bv.x - 6, y: bv.y - 4, t: 0 });
          if (pinecones < 5) {
            pinecones++;
            if (pinecones >= 5 && lives < 3) {
              // 5 cones + not full health → instant extra life
              lives++;
              pinecones = 0;
              floatingTexts.push({ text: '+ EXTRA LIFE! ❤', x: bv.x - 6, y: bv.y - 22, t: 0 });
              sfxLifeUp();
            } else {
              sfxBonus();
            }
          }
          // If already at 5 cones (saved for shield) → chop still shows PERFECT but doesn't count
          updateHUD();
        }
        activeFir.falling = true;
        activeFir.chomping = false;
      }
      activeFir   = null;
      worldPaused = false;
      bv.state    = 'run';
      bv.y        = GROUND - BV_H * BV_CELL;
    }
  }

  // ── River swim — mandatory crossing mechanic ──
  // World freezes when beaver hits a river. Player must actively swim (alternate
  // ← → arrows) to advance through it. Too slow between strokes = drown.
  riverActive = false;
  for (const o of obstacles) {
    if (o.type === 'river' && !o.passed) {
      const bx = bv.x + 8*BV_CELL;
      if (bx > o.x && bx < o.x + o.w) {
        riverActive = true;
        if (bv.state !== 'swim') {
          bv.state = 'swim';
          bv.vy    = 0;
          riverAlternate   = 0;
          lastRiverKey     = '';
          currentRiver     = o;
          riverTimer       = 0;
          // Start visual position at beaver's actual entry point in the river
          bv._swimProgress = Math.max(0, bv.x + 8*BV_CELL - o.x);
          bv.y = GROUND - 10 * BV_CELL;  // body straddles ground/water surface, tail above
          worldPaused = true;  // freeze world — must swim across
        }
      }
    }
  }
  if (!riverActive && bv.state === 'swim') {
    // Exited river zone (e.g. after hitObstacle reset)
    bv.state = 'run';
    bv.y = GROUND - BV_H*BV_CELL;
  }

  // River crossing logic
  if (riverActive && bv.state === 'swim' && currentRiver) {
    bv._riverDecay += dt;
    riverTimer     += dt;

    if (riverAlternate > 0) {
      // Good stroke — advance and reset drown timer
      bv._swimProgress += 14;
      bv._riverDecay   = 0;
      lastStrokeFrame  = frame;
      riverAlternate   = 0;

      // Finale hut reached? Beaver nose enters the hut entry hole.
      if (currentRiver.finale && bv._swimProgress >= Math.floor(currentRiver.w * 0.50)) {
        gameState    = 'finaleEntering';
        finaleTimer  = 0;
        finaleHutX   = currentRiver.x + Math.floor(currentRiver.w * 0.56);
        lastTailStroke = -9999;
        floatingTexts.push({ text: 'HOME!', x: currentRiver.x + bv._swimProgress + 10, y: bv.y - 18, t: 0 });
        sfxVictory();
        return;
      }

      // Crossed? Body center (col 10 = 10*BV_CELL from origin) past river exit
      if (bv._swimProgress + 10*BV_CELL >= currentRiver.w) {
        bvVisualOffset = (currentRiver.x + bv._swimProgress) - bv.x;
        currentRiver.passed = true;
        currentRiver = null;
        bv.state     = 'run';
        bv.y         = GROUND - BV_H*BV_CELL;
        bv._riverDecay   = 0;
        bv._swimProgress = 0;
        riverActive  = false;
        riverTimer   = 0;
        worldPaused  = false;
      }
    }

    // Only update swim y if still crossing (not just completed or hit)
    if (currentRiver) {
      // At surface when swimming well; sinks linearly after 20 idle frames
      // Full sink at decay=140 (2s of "FASTER" display) — then lose a life
      const sinkRatio = Math.min(Math.max(0, bv._riverDecay - 20) / 120, 1);
      bv.y = GROUND - 10*BV_CELL + Math.floor(sinkRatio * 10*BV_CELL);

      // Lose a life after 2 seconds showing FASTER (decay 20→140)
      if (bv._riverDecay > 140) {
        hitObstacle();
        bv._riverDecay = 0;
        riverTimer     = 0;
      }
    }
  } else if (!riverActive) {
    bv._riverDecay   = 0;
    bv._swimProgress = 0;
  }

  if (bv.invincible > 0) bv.invincible = Math.max(0, bv.invincible - dt);

  // ── Tail-stroke splash detection (phase 2 = horizontal/power stroke) ──
  if (bv.state === 'swim' && riverActive) {
    const sp  = Math.floor(frame / 8) % 4;
    const psp = Math.floor(prevFrame / 8) % 4;
    if (sp === 2 && psp !== 2 && bv._riverDecay <= 20) { lastTailStroke = frame; sfxSplash(); }
  }

  // ── Post-river slide: world catches up as beaver glides back to x=80 ──
  // step is in pixels (already scaled by dt via speed*dt cap)
  let extraScroll = 0;
  if (bvVisualOffset > 0) {
    const step = Math.min(bvVisualOffset, speed * dt);
    bvVisualOffset = Math.max(0, bvVisualOffset - step);
    extraScroll = step;
  }

  // ── Obstacle update ──
  for (let i = obstacles.length-1; i >= 0; i--) {
    const o = obstacles[i];

    if (!worldPaused) o.x -= speed * dt + extraScroll;

    if (o.type === 'fir') {
      if (o.falling) {
        o.fallAngle += 0.065 * dt;
        if (o.fallAngle >= Math.PI/2) { o.done = true; o.fallAngle = Math.PI/2; }
      }
      if (o.done && o.x < -60) { obstacles.splice(i,1); continue; }
      if (!o.falling && !o.chomping && !o.done) {
        const firRect = { x: o.x + 3*CELL, y: o.y, w: 8*CELL, h: FIR_H*CELL };
        if (overlap(beaverRect(), firRect)) hitObstacle();
      }
      if (!o.falling && !o.chomping && o.x < -30) { obstacles.splice(i,1); continue; }
    }

    if (o.type === 'log') {
      const logRect = { x: o.x, y: o.y, w: 22*CELL, h: LOG_H*CELL };
      if (bv.state !== 'jump' && overlap(beaverRect(), logRect)) hitObstacle();
      if (o.x < -90) obstacles.splice(i,1);
    }

    if (o.type === 'river') {
      if (o.x + o.w < 0) { obstacles.splice(i,1); continue; }
      if (!o.passed && o.x + o.w < bv.x) { o.passed = true; score += 20; }
    }
  }

  // ── Clouds & grass ──
  if (!worldPaused) {
    for (const c of clouds) {
      c.x -= c.speed * dt + extraScroll * (c.speed / speed);
      if (c.x < -60) { c.x = W+20; c.y = 18 + Math.random()*55; }
    }
    for (const g of grassTufts) {
      g.x -= speed * dt + extraScroll;
      if (g.x < -20) g.x = W + Math.random()*40;
    }
  }

  // ── Level completion ──
  const thresholds = [1800, 2400, 3000];
  if ((score - levelStartScore) >= thresholds[level-1] && gameState === 'playing') {
    if (level < 3) {
      level++; gameState = 'levelIntro'; showLevelIntro(level);
    } else if (!finaleTriggered) {
      // Level 3 end: spawn the finale river with beaver hut instead of instant win
      finaleTriggered = true;
      spawnTimer = 9999;  // no more normal spawns
      obstacles.push({ type: 'river', x: W + 160, w: 420, passed: false, finale: true });
    }
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.fillStyle = FG;
  ctx.fillRect(0, GROUND,   W, 3);
  ctx.fillRect(0, GROUND+3, W, 2);

  // Clouds
  for (const c of clouds) drawCloud(ctx, c.x, c.y);

  // Grass tufts
  for (const g of grassTufts) drawGrass(ctx, g.x, GROUND - CELL);

  // Obstacles (back to front)
  for (const o of obstacles) {
    if (o.type === 'river') {
      drawRiver(ctx, o.x, o.w, waveOffset);
      if (o.finale) drawHut(ctx, o.x + Math.floor(o.w * 0.56), GROUND - 12*CELL);
    }
    if (o.type === 'log')   drawLog(ctx, o.x, o.y);
    if (o.type === 'fir') {
      const bp = (o.chomping && bv.state === 'bite') ? Math.max(0, 1 - bv.biteTimer / 72) : 0;
      drawFir(ctx, o.x, o.y, o.falling, o.fallAngle, bp);
    }
  }

  // Beaver visual x: moves through river when swimming, then slides back to x=80
  const bvDrawX = (bv.state === 'swim' && currentRiver)
    ? currentRiver.x + bv._swimProgress
    : bv.x + bvVisualOffset;

  // Beaver (blink when invincible, fade out when entering finale hut)
  const bvAlpha = (gameState === 'finaleEntering') ? Math.max(0, 1 - finaleTimer / 35) : 1;
  if (bvAlpha > 0 && (bv.invincible === 0 || Math.floor(bv.invincible/6) % 2 === 0)) {
    ctx.globalAlpha = bvAlpha;
    drawBeaver(ctx, bvDrawX, bv.y, frame, bv.state);
    ctx.globalAlpha = 1;
  }

  // Finale: celebration beaver on hut top + sky message
  if (gameState === 'finaleEntering' && finaleTimer > 30) {
    // Hut top = y passed to drawHut = GROUND - 12*CELL
    // Beaver feet at (beaverY + BV_H*BV_CELL); want feet on dome top
    const domeTopY  = GROUND - 12*CELL;
    // Body center col = (7+18)/2 = 12.5 → 12.5*BV_CELL px from beaver left
    // Hut center = finaleHutX + 10*CELL (half of 20 cols)
    const celebX    = finaleHutX + 10*CELL - Math.round(12.5 * BV_CELL);
    // Jump animation: alternate every 25 finaleTimer ticks (~0.4s at 60fps)
    const celebPhase = Math.floor(finaleTimer / 25) % 2;
    const celebY    = domeTopY - BV_H*BV_CELL - (celebPhase === 1 ? 6*BV_CELL : 0);
    const celebState = celebPhase === 1 ? 'jump' : 'run';
    // Use finaleTimer as frame so legs animate
    drawBeaver(ctx, celebX, celebY, finaleTimer, celebState);
    // Plane banner: loops right→left, foreground over clouds (drawn after them)
    {
      const planeSpeed = 3;
      const planeW     = 30;
      const ropeLen    = 34;
      const bannerH    = 16;
      const msg        = 'VICTORY!  PRESS ANY KEY';
      ctx.font = 'bold 12px "Silkscreen", monospace';
      const bannerW = ctx.measureText(msg).width + 14;

      // Full pass: plane nose travels from W+200 to -(planeW+ropeLen+bannerW)
      const passFrames  = Math.ceil((W + 200 + planeW + ropeLen + bannerW) / planeSpeed);
      const waitFrames  = 60;  // 1 s pause before next loop
      const cycleFrames = passFrames + waitFrames;

      const t         = Math.max(0, finaleTimer - 35);   // time since plane intro
      const tInCycle  = t % cycleFrames;

      if (tInCycle < passFrames) {
        const px = Math.round(W + 200 - tInCycle * planeSpeed);
        // Altitude bobbing: two overlapping sines for organic feel (±2-3 px)
        const py = 20 + Math.round(
          Math.sin(tInCycle * 0.040) * 2.0 +
          Math.sin(tInCycle * 0.013) * 1.2
        );
        const bx = px + planeW + ropeLen;
        const by = py + 7 - Math.floor(bannerH / 2);  // rope meets banner centre

        ctx.fillStyle = FG;
        // Propeller — alternates vertical / horizontal
        if (Math.floor(finaleTimer / 5) % 2 === 0) {
          ctx.fillRect(px - 1, py + 2, 2, 10);
        } else {
          ctx.fillRect(px - 3, py + 6, 6,  2);
        }
        // Fuselage
        ctx.fillRect(px + 1,           py + 5, planeW, 4);
        // Cockpit bubble
        ctx.fillRect(px + 7,           py + 2, 10, 4);
        // Lower wing
        ctx.fillRect(px + 9,           py + 8, 14, 3);
        // Tail fin (top-rear)
        ctx.fillRect(px + planeW - 2,  py + 2,  4, 4);
        // Tail stabiliser (bottom-rear)
        ctx.fillRect(px + planeW - 4,  py + 9,  6, 2);
        // Rope (tow cable)
        ctx.fillRect(px + planeW + 1,  py + 7, ropeLen, 1);
        // Banner background
        ctx.fillStyle = BG;
        ctx.fillRect(bx, by, bannerW, bannerH);
        // Banner border
        ctx.fillStyle = FG;
        ctx.fillRect(bx,               by,               bannerW, 1);
        ctx.fillRect(bx,               by + bannerH - 1, bannerW, 1);
        ctx.fillRect(bx,               by,               1, bannerH);
        ctx.fillRect(bx + bannerW - 1, by,               1, bannerH);
        // Banner text
        ctx.fillText(msg, bx + 7, by + 12);
      }
    }
  }

  // "CHOMP" label during bite
  if (bv.state === 'bite') {
    const chewPhase = Math.floor(frame / 10) % 2;
    if (chewPhase === 1) {
      ctx.fillStyle = FG;
      ctx.font = 'bold 11px "Silkscreen", monospace';
      ctx.fillText('CHOMP!', bv.x - 12, bv.y - 6);
    }
  }

  // River swim: text warning + upward water splash
  if (riverActive && bv.state === 'swim') {
    ctx.fillStyle = FG;
    ctx.font = 'bold 12px "Silkscreen", monospace';
    if (bv._riverDecay > 90) {
      ctx.fillText('SWIM!!!', bvDrawX - 16, bv.y - 6);
    } else if (bv._riverDecay > 20) {
      ctx.fillText('FASTER', bvDrawX - 14, bv.y - 6);
    }

    // Upward splash when tail hits horizontal (power stroke)
    const splashAge = frame - lastTailStroke;
    if (splashAge < 18) {
      ctx.fillStyle = FG;  // dark drops on yellow sky — visible above waterline
      const sx = bvDrawX + 4*BV_CELL;  // tail x (cols 4-5 in new sprite)
      const sy = bv.y + 9*BV_CELL;    // water surface = body top (row 9)
      if (splashAge < 5) {
        // Large upward burst
        ctx.fillRect(sx - 10, sy - 16, 2, 8);
        ctx.fillRect(sx -  5, sy - 20, 2, 10);
        ctx.fillRect(sx,      sy - 14, 2, 7);
        ctx.fillRect(sx +  5, sy - 10, 2, 5);
        ctx.fillRect(sx - 15, sy - 10, 2, 5);
      } else if (splashAge < 11) {
        // Mid-phase: drops arcing
        ctx.fillRect(sx - 12, sy - 12, 2, 3);
        ctx.fillRect(sx -  5, sy - 16, 2, 4);
        ctx.fillRect(sx +  2, sy - 10, 2, 3);
        ctx.fillRect(sx - 18, sy -  8, 2, 2);
      } else {
        // Final specks falling back
        ctx.fillRect(sx -  8, sy -  8, 2, 2);
        ctx.fillRect(sx -  2, sy -  6, 2, 2);
        ctx.fillRect(sx +  4, sy -  5, 2, 2);
      }
    }
  }

  // Floating hearts (life lost)
  ctx.font = '14px "Silkscreen", monospace';
  for (const h of floatingHearts) {
    ctx.globalAlpha = Math.max(0, 1 - h.t / 120);
    ctx.fillStyle = FG;
    ctx.fillText('❤', h.x, h.y);
  }
  ctx.globalAlpha = 1;

  // Jump dust puffs
  for (const d of dustParticles) {
    ctx.globalAlpha = Math.max(0, 1 - d.t / 22) * 0.65;
    ctx.fillStyle = FG;
    ctx.fillRect(Math.round(d.x), Math.round(d.y), 2, 2);
  }
  ctx.globalAlpha = 1;

  // Floating bonus texts (perfect chomp etc.)
  ctx.font = 'bold 10px "Silkscreen", monospace';
  for (const t of floatingTexts) {
    ctx.globalAlpha = Math.max(0, 1 - t.t / 90);
    ctx.fillStyle = FG;
    ctx.fillText(t.text, t.x, t.y);
  }
  ctx.globalAlpha = 1;
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
// Delta-time loop: measures real elapsed time between frames and normalises to
// 60 fps so the game runs at consistent speed on any display (30/60/120 Hz) and
// in any power mode (battery vs. plugged-in).
function loop(now) {
  if (!lastTime) { lastTime = now; requestAnimationFrame(loop); return; }
  const rawDt = (now - lastTime) / (1000 / 60); // 1.0 = 60 fps, 2.0 = 30 fps
  const dt    = Math.min(rawDt, 3);             // cap at 3× to absorb tab-restore spikes
  lastTime = now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

gameState = 'title';
showTitle();
requestAnimationFrame(loop);
</script>
</body>
</html>
