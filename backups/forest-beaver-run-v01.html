<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>F0R35T B34V3R RUN</title>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #DDF327;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Silkscreen', monospace;
    overflow: hidden;
    user-select: none;
  }
  #gameWrapper { position: relative; width: 906px; border: 3px solid #3F5B1E; }
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px 8px;
    color: #3F5B1E;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 1px;
  }
  canvas { display: block; background: #DDF327; }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: #DDF327;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #3F5B1E;
    z-index: 10;
  }
  #overlay h1 { font-size: 32px; margin-bottom: 12px; letter-spacing: 2px; }
  #overlay .subtitle { font-size: 15px; margin-bottom: 24px; opacity: 0.8; }
  #overlay .instructions { font-size: 14px; margin-bottom: 8px; line-height: 1.9; text-align: center; }
  #overlay .hint { font-size: 13px; margin-top: 20px; opacity: 0.7; }
  .key-pill {
    display: inline-block;
    border: 2px solid #3F5B1E;
    border-radius: 3px;
    padding: 0 6px;
    font-size: 12px;
    font-weight: bold;
    background: #DDF327;
    vertical-align: middle;
    line-height: 20px;
  }
  .level-badge {
    font-size: 11px;
    border: 2px solid #3F5B1E;
    border-radius: 3px;
    padding: 2px 8px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <div id="hud">
    <span id="levelLabel" class="level-badge">LEVEL 1</span>
    <span id="scoreLabel">SCORE: 0</span>
    <span id="livesLabel">❤ ❤ ❤</span>
  </div>
  <canvas id="c" width="900" height="280"></canvas>
  <div id="overlay"></div>
</div>

<script>
const BG = '#DDF327', FG = '#3F5B1E';
const W = 900, H = 280, GROUND = H - 48; // 232
const CELL = 2; // 2px per virtual pixel — finer detail than before

// ─── BEAVER SPRITE ────────────────────────────────────────────────────────────
// Mascot design: flat wide body, prominent upright paddle tail (left=back),
// small round head with ear + eye, buck-tooth snout (right=front).
// Sprite: 20 cols × 13 rows = 40×26px.  BV_H = 13.
// Tail UP when running/jumping/swimming. Tail HORIZONTAL when chomping.

function drawBeaverShape(ctx, ox, oy, frame, state) {
  const P = CELL;
  const f = (c,r,w,h) => { ctx.fillStyle=FG; ctx.fillRect(ox+c*P, oy+r*P, (w||1)*P, (h||1)*P); };
  const e = (c,r,w,h) => { ctx.fillStyle=BG; ctx.fillRect(ox+c*P, oy+r*P, (w||1)*P, (h||1)*P); };

  const legA      = Math.floor(frame/7) % 2 === 0;
  const chewPhase = state === 'bite' ? Math.floor(frame/10) % 2 : 0;
  const tailUp    = (state !== 'bite');

  // ── TAIL ──────────────────────────────────────────────────────────────────
  if (tailUp) {
    if (state === 'swim') {
      // 4-phase tail stroke: up (0) → mid (1) → horizontal/splash (2) → mid (3)
      const sp = Math.floor(frame / 8) % 4;
      if (sp === 0 || sp === 3) {
        f(1, 0, 2, 1); f(0, 1, 4, 8);       // fully upright
      } else if (sp === 1) {
        f(0, 2, 3, 1); f(0, 3, 4, 5);       // sweeping down
      } else {
        f(0, 6, 1, 1); f(0, 7, 6, 3);       // horizontal (power stroke)
      }
    } else {
      f(1, 0, 2, 1); f(0, 1, 4, 8);         // running / jumping: fully upright
    }
  } else {
    // Horizontal: flat paddle at body height when chomping
    f(0, 6, 1, 1);   // top-left edge
    f(0, 7, 6, 3);   // flat horizontal paddle (cols 0-5, rows 7-9)
  }

  // ── EAR ──────────────────────────────────────────────────────────────────
  f(12, 5, 2, 1);   // ear tip (narrow)
  f(11, 6, 4, 1);   // ear base (wider)

  // ── HEAD (one row above main body) ───────────────────────────────────────
  f(9, 7, 6, 1);    // forehead row — head dome

  // ── BODY + HEAD (merge into one mass) ────────────────────────────────────
  f(3,  8, 13, 1);  // full row: body + head
  f(3,  9, 13, 1);  // full row: body + head lower
  f(4, 10,  9, 1);  // body bottom (slight taper)

  // ── EYE (BG dot carved into head) ────────────────────────────────────────
  e(13, 8);

  // ── SNOUT / BUCK TEETH ───────────────────────────────────────────────────
  f(15, 8, 3, 1);   // upper jaw (2 rows, fixed)
  f(15, 9, 3, 1);   // upper jaw lower

  // Lower jaw: normal (row 9 side-by-side) or dropped open (row 11)
  const jawRow = chewPhase === 1 ? 11 : 10;
  f(15, jawRow, 3, 1);
  e(16, jawRow);    // tooth gap left
  e(17, jawRow);    // tooth gap right

  // ── LEGS (two clean 2-px stubs only) ─────────────────────────────────────
  if (state === 'jump') {
    f(4,  9, 2, 2); f(10,  9, 2, 2);           // legs pulled up during jump
  } else if (state === 'run') {
    if (legA) { f(4,11,2,2); f(10,11,2,2); }   // stride A
    else       { f(5,11,2,2); f(11,11,2,2); }  // stride B
  } else if (state === 'swim') {
    if (legA) { f(4,11,3,1); f(10,11,3,1); }   // kick out
    else       { f(5,11,3,1); f(11,11,3,1); }  // kick in
  } else {  // bite
    f(4,11,2,2); f(10,11,2,2);                 // planted firmly
  }

  // Wood chip flies when jaw snaps open
  if (chewPhase === 1) {
    f(18, 8, 1, 1);
    f(19, 7, 1, 1);
  }
}

function drawBeaver(ctx, x, y, frame, state) {
  drawBeaverShape(ctx, x, y, frame, state);
}

// ─── FIR TREE SPRITE ──────────────────────────────────────────────────────────
// 14 cols × 36 rows = 28×72px. Taller trunk so it can't be jumped over.
// Pivot for falling = trunk base (col 7, row 36).

function drawFir(ctx, x, y, falling, fallAngle) {
  ctx.save();
  if (falling) {
    const px = x + 7 * CELL;   // trunk centre x
    const py = GROUND;          // trunk base y
    ctx.translate(px, py);
    ctx.rotate(fallAngle);
    ctx.translate(-px, -py);
  }

  ctx.fillStyle = FG;
  const P = CELL;
  const row = (r, c0, len) => ctx.fillRect(x + c0*P, y + r*P, len*P, P);

  // TIP
  row( 0,  6, 2);

  // UPPER TIER (rows 1–8)
  row( 1,  5, 4);
  row( 2,  4, 6);
  row( 3,  3, 8);
  row( 4,  5, 4);  // step in
  row( 5,  4, 6);
  row( 6,  3, 8);
  row( 7,  2,10);
  row( 8,  4, 6);  // step in

  // MID TIER (rows 9–16)
  row( 9,  3, 8);
  row(10,  2,10);
  row(11,  1,12);
  row(12,  0,14);
  row(13,  2,10); // step in
  row(14,  1,12);
  row(15,  0,14);
  row(16,  2,10); // step in

  // LOWER TIER (rows 17–19)
  row(17,  1,12);
  row(18,  0,14);
  row(19,  1,12);

  // TRUNK (rows 20–35, cols 5–8, 4 wide — tall so it can't be jumped over)
  for (let r = 20; r < 36; r++) row(r, 5, 4);

  ctx.restore();
}

// ─── LOG SPRITE ───────────────────────────────────────────────────────────────
// 22 cols × 5 rows = 44×10px. log.y = GROUND - 5*CELL

function drawLog(ctx, x, y) {
  const P = CELL;
  const row = (r, c0, len) => { ctx.fillStyle=FG; ctx.fillRect(x+c0*P, y+r*P, len*P, P); };
  const dot = (c, r)        => { ctx.fillStyle=BG; ctx.fillRect(x+c*P,  y+r*P, P,     P); };

  // Log body
  row(0,  1, 20);
  row(1,  0, 22);
  row(2,  0, 22);
  row(3,  0, 22);
  row(4,  1, 20);

  // Left end-grain rings
  dot(1, 1); dot(1, 3);
  dot(2, 2);

  // Right end-grain rings
  dot(20, 1); dot(20, 3);
  dot(19, 2);

  // Bark knots across body
  dot(5, 0); dot(11, 0); dot(16, 0);
  dot(6, 4); dot(12, 4); dot(17, 4);
}

// ─── RIVER ────────────────────────────────────────────────────────────────────
function drawRiver(ctx, x, w, waveOffset) {
  ctx.fillStyle = FG;
  ctx.fillRect(x, GROUND - 14, w, 28);
  ctx.fillStyle = BG;
  for (let i = 0; i < w; i += 24) {
    const wx = x + i + (waveOffset % 24);
    ctx.fillRect(wx, GROUND - 9, 11, 4);
    ctx.fillRect(wx + 10, GROUND + 1, 11, 4);
  }
}

// ─── CLOUD ────────────────────────────────────────────────────────────────────
function drawCloud(ctx, x, y) {
  const P = CELL;
  const f = (c,r,w,h) => { ctx.fillStyle=FG; ctx.fillRect(x+c*P, y+r*P, (w||1)*P, (h||1)*P); };
  f(2,0,3,1);
  f(1,1,5,1);
  f(0,2,7,2);
  f(1,4,5,1);
}

// ─── GRASS ────────────────────────────────────────────────────────────────────
function drawGrass(ctx, x, y) {
  const P = CELL;
  ctx.fillStyle = FG;
  ctx.fillRect(x,      y,     P, P*2);
  ctx.fillRect(x+P*2,  y-P,   P, P*3);
  ctx.fillRect(x+P*4,  y,     P, P*2);
  ctx.fillRect(x+P*6,  y-P,   P, P*2);
}

// ─── GAME STATE ───────────────────────────────────────────────────────────────
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

let gameState = 'title';
let level = 1, score = 0, lives = 3, hiScore = 0;
let frame = 0, speed = 2.5;
let worldPaused = false;
let levelStartScore = 0;

const BV_H = 13; // beaver height in cells (13 rows × 2px = 26px)
const FIR_H = 36; // tall enough that it cannot be jumped over
const LOG_H = 5;

const bv = {
  x: 80,
  y: GROUND - BV_H * CELL,
  vy: 0,
  state: 'run',
  biteTimer: 0,
  invincible: 0,
  _riverDecay: 0,
  _swimProgress: 0,  // px swum through current river
};

let obstacles  = [];
let clouds     = [];
let grassTufts = [];
let spawnTimer = 80;
let waveOffset = 0;

let riverActive    = false;
let riverAlternate = 0;
let lastRiverKey   = '';
let activeFir      = null;
let currentRiver   = null;  // river obstacle currently being swum
let riverTimer     = 0;     // total frames in current river crossing
let lastStrokeFrame = -100; // frame number of last valid swim stroke (for splash)
let lastTailStroke  = -100; // frame when tail hit horizontal phase (for splash visual)
let floatingHearts  = [];   // hearts that fly up on life loss
let dyingTimer      = 0;    // counts down before showing OUCH screen
let bvVisualOffset  = 0;    // smooth x offset after river crossing (slides back to 0)

// ─── KEYS ─────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  const prev = keys[e.code];
  keys[e.code] = true;
  if (!prev) onKeyDown(e.code);
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function cheatToLevel(lvl) {
  level = lvl; lives = 3; score = 0;
  worldPaused = false;
  if (activeFir) { activeFir.chomping = false; activeFir = null; }
  gameState = 'levelIntro';
  showLevelIntro(lvl);
}

function onKeyDown(code) {
  // Cheat codes: A/B/C skip to level 1/2/3 from anywhere
  if (code === 'KeyA') { cheatToLevel(1); return; }
  if (code === 'KeyB') { cheatToLevel(2); return; }
  if (code === 'KeyC') { cheatToLevel(3); return; }

  // Pause / resume with Space during play
  if (code === 'Space' && gameState === 'playing') {
    gameState = 'paused';
    showOverlay(`<h1>PAUSED</h1><div class="hint">Press <span class="key-pill">SPACE</span> to resume</div>`);
    return;
  }
  if ((code === 'Space' || code === 'Enter') && gameState === 'paused') {
    gameState = 'playing';
    hideOverlay();
    return;
  }

  if (gameState === 'dying') return;  // ignore input during death animation
  if (['title','levelIntro','dead','win'].includes(gameState)) {
    if (code === 'Space' || code === 'Enter') { startOrAdvance(); return; }
  }
  if (gameState !== 'playing') return;

  if (code === 'ArrowUp' && bv.state === 'run') {
    bv.vy = -8;   // lower arc: clears logs but NOT trees
    bv.state = 'jump';
  }

  if (code === 'ArrowDown' && bv.state === 'run') {
    const nearFir = obstacles.find(o =>
      o.type === 'fir' && !o.chomping && !o.falling &&
      o.x - bv.x > 0 && o.x - bv.x < 110
    );
    if (nearFir) {
      bv.state   = 'bite';
      bv.biteTimer = 72;   // ~1.2 seconds of chewing
      activeFir  = nearFir;
      nearFir.chomping = true;
      worldPaused = true;
    }
  }

  if (code === 'ArrowLeft' || code === 'ArrowRight') {
    if (riverActive && bv.state === 'swim') {
      const dir = code === 'ArrowLeft' ? 'left' : 'right';
      if (dir !== lastRiverKey) { lastRiverKey = dir; riverAlternate++; }
    }
  }
}

// ─── OVERLAYS ─────────────────────────────────────────────────────────────────
const LEVEL_DATA = [
  {
    title: 'LEVEL 1 — THE FOREST',
    intro: `A fir tree blocks the path!<br><br>
      Press <span class="key-pill">↓ DOWN</span> to start chewing.<br>
      The beaver will gnaw it down — then run!`,
    obstacles: ['fir'],
  },
  {
    title: 'LEVEL 2 — FALLEN LOGS',
    intro: `Logs block the trail!<br><br>
      Press <span class="key-pill">↑ UP</span> to jump over them.<br>
      Watch for fir trees too.`,
    obstacles: ['fir','log'],
  },
  {
    title: 'LEVEL 3 — THE RIVER',
    intro: `A river cuts through the forest!<br><br>
      Alternate <span class="key-pill">← LEFT</span> &nbsp;and&nbsp; <span class="key-pill">→ RIGHT</span> to swim.<br>
      Stop and you sink. Plus all previous obstacles.`,
    obstacles: ['fir','log','river'],
  },
];

function showOverlay(html) { overlay.innerHTML = html; overlay.style.display = 'flex'; }
function hideOverlay()      { overlay.style.display = 'none'; }

function showTitle() {
  showOverlay(`<canvas id="bvTitle" width="44" height="30" style="width:88px;height:60px;margin-bottom:10px;image-rendering:pixelated;image-rendering:crisp-edges"></canvas>
    <h1>F0R35T B34V3R RUN</h1>
    <div class="subtitle">A forest survival story</div>
    <div class="instructions">Chop. Jump. Swim. Survive.</div>
    <div class="hint">Press <span class="key-pill">SPACE</span> or <span class="key-pill">ENTER</span> to start</div>`);
  const bc = document.getElementById('bvTitle');
  const bctx = bc.getContext('2d');
  bctx.fillStyle = BG; bctx.fillRect(0, 0, 44, 30);
  drawBeaverShape(bctx, 2, 2, 0, 'run');
}
function showLevelIntro(lvl) {
  const d = LEVEL_DATA[lvl-1];
  showOverlay(`<div class="level-badge">${d.title}</div><br>
    <div class="instructions">${d.intro}</div>
    <div class="hint">Press <span class="key-pill">SPACE</span> to play</div>`);
}
function showDead() {
  showOverlay(`<h1>OUCH!</h1>
    <div class="subtitle">Score: ${score} &nbsp;|&nbsp; Best: ${hiScore}</div>
    <div class="hint">Press <span class="key-pill">SPACE</span> to try again</div>`);
}
function showWin() {
  showOverlay(`<h1>YOU WIN! 🦫</h1>
    <div class="subtitle">The beaver made it through the forest!</div>
    <div class="subtitle">Final score: ${score}</div>
    <div class="hint">Press <span class="key-pill">SPACE</span> to play again</div>`);
}

function startOrAdvance() {
  if (gameState === 'title') {
    level = 1; score = 0; lives = 3;
    gameState = 'levelIntro'; showLevelIntro(level); return;
  }
  if (gameState === 'levelIntro') { startLevel(level); return; }
  if (gameState === 'dead') {
    if (lives > 0) { gameState = 'levelIntro'; showLevelIntro(level); }
    else { level=1; score=0; lives=3; gameState='levelIntro'; showLevelIntro(level); }
    return;
  }
  if (gameState === 'win') {
    level=1; score=0; lives=3; gameState='levelIntro'; showLevelIntro(level);
  }
}

function startLevel(lvl) {
  hideOverlay();
  gameState = 'playing';
  speed = 2.5 + (lvl - 1) * 1.0;
  levelStartScore = score;
  spawnTimer = 100;
  obstacles  = [];
  floatingHearts = [];
  dyingTimer = 0;
  bvVisualOffset = 0;
  worldPaused = false;
  activeFir   = null;
  currentRiver = null;
  riverTimer   = 0;
  bv.y = GROUND - BV_H * CELL;
  bv.vy = 0;
  bv.state = 'run';
  bv.biteTimer = 0;
  bv.invincible = 0;
  bv._riverDecay = 0;
  bv._swimProgress = 0;
  riverActive = false;
  updateHUD();
}

function updateHUD() {
  document.getElementById('levelLabel').textContent = `LEVEL ${level}`;
  document.getElementById('scoreLabel').textContent = `SCORE: ${score}`;
  document.getElementById('livesLabel').textContent = lives > 0 ? '❤ '.repeat(lives).trim() : '☆';
}

// ─── SPAWN ────────────────────────────────────────────────────────────────────
function spawnObstacle() {
  const allowed = LEVEL_DATA[level-1].obstacles;
  let pool = [...allowed];
  // Level 3: rivers appear as often as any other obstacle (1-in-3 chance)
  if (pool.includes('river')) { pool = ['fir', 'log', 'river']; }
  const type = pool[Math.floor(Math.random() * pool.length)];

  if (type === 'fir') {
    obstacles.push({ type:'fir', x: W+20, y: GROUND - FIR_H*CELL,
      falling:false, chomping:false, fallAngle:0, done:false });
    spawnTimer = 110 + Math.random()*70;
  } else if (type === 'log') {
    obstacles.push({ type:'log', x: W+20, y: GROUND - LOG_H*CELL });
    spawnTimer = 100 + Math.random()*70;
  } else if (type === 'river') {
    const rw = 200 + Math.random()*60; // width = required swim distance (~14-18 strokes)
    obstacles.push({ type:'river', x: W+20, w: rw, passed: false });
    spawnTimer = 200 + Math.random()*80;
  }
}

// ─── COLLISION ────────────────────────────────────────────────────────────────
function beaverRect() {
  // hitbox = body area only (cols 3-13, rows 6-10)
  return { x: bv.x + 3*CELL, y: bv.y + 6*CELL, w: 11*CELL, h: 5*CELL };
}
function overlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function hitObstacle() {
  if (bv.invincible > 0) return;
  lives--;
  hiScore = Math.max(hiScore, score);
  // Spawn a floating heart at the beaver's current position
  floatingHearts.push({ x: bv.x + 10*CELL, y: bv.y + 4*CELL, t: 0 });
  updateHUD();
  if (lives <= 0) {
    gameState = 'dying';   // allow heart animation to play for 1s first
    worldPaused = false;
    dyingTimer  = 60;      // 60 frames ≈ 1 second before OUCH overlay
  } else {
    bv.invincible = 120;
    bv.state = 'run';
    bv.y = GROUND - BV_H * CELL;
    bv.vy = 0;
    riverActive      = false;
    worldPaused      = false;
    bv._swimProgress = 0;
    bvVisualOffset   = 0;
    if (currentRiver) { currentRiver.passed = true; currentRiver = null; }
    riverTimer = 0;
    if (activeFir) { activeFir.chomping = false; activeFir = null; }
  }
}

// ─── ENVIRONMENT ──────────────────────────────────────────────────────────────
function initEnvironment() {
  clouds = [];
  grassTufts = [];
  for (let i = 0; i < 6; i++)
    clouds.push({ x: Math.random()*W, y: 18 + Math.random()*55, speed: 0.35 + Math.random()*0.35 });
  for (let i = 0; i < 16; i++)
    grassTufts.push({ x: Math.random()*W });
}
initEnvironment();

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update() {
  // These run regardless of game state (hearts fly, death delay ticks)
  for (let i = floatingHearts.length - 1; i >= 0; i--) {
    floatingHearts[i].t++;
    floatingHearts[i].y -= 0.9;
    if (floatingHearts[i].t > 120) floatingHearts.splice(i, 1);
  }
  if (dyingTimer > 0) {
    dyingTimer--;
    if (dyingTimer === 0) { gameState = 'dead'; showDead(); }
  }

  if (gameState !== 'playing') return;

  frame++;
  if (!worldPaused) {
    score++;
    if (score > hiScore) hiScore = score;
    if (frame % 30 === 0) updateHUD();
    waveOffset += 2;
    if (frame % 500 === 0) speed = Math.min(speed + 0.25, 9);
    spawnTimer--;
    if (spawnTimer <= 0) spawnObstacle();
  }

  // ── Beaver physics ──
  if (bv.state === 'jump') {
    bv.vy += 0.65;
    bv.y  += bv.vy;
    if (bv.y >= GROUND - BV_H*CELL) {
      bv.y = GROUND - BV_H*CELL;
      bv.vy = 0;
      bv.state = 'run';
    }
  }

  // ── Bite / chew timer ──
  if (bv.state === 'bite') {
    bv.biteTimer--;
    if (bv.biteTimer <= 0) {
      if (activeFir) { activeFir.falling = true; activeFir.chomping = false; }
      activeFir   = null;
      worldPaused = false;
      bv.state    = 'run';
    }
  }

  // ── River swim — mandatory crossing mechanic ──
  // World freezes when beaver hits a river. Player must actively swim (alternate
  // ← → arrows) to advance through it. Too slow between strokes = drown.
  riverActive = false;
  for (const o of obstacles) {
    if (o.type === 'river' && !o.passed) {
      const bx = bv.x + 8*CELL;
      if (bx > o.x && bx < o.x + o.w) {
        riverActive = true;
        if (bv.state !== 'swim') {
          bv.state = 'swim';
          bv.vy    = 0;
          riverAlternate   = 0;
          lastRiverKey     = '';
          currentRiver     = o;
          riverTimer       = 0;
          // Start visual position at beaver's actual entry point in the river
          bv._swimProgress = Math.max(0, bv.x + 8*CELL - o.x);
          bv.y = GROUND - 14*CELL;  // surface: half body above waterline
          worldPaused = true;  // freeze world — must swim across
        }
      }
    }
  }
  if (!riverActive && bv.state === 'swim') {
    // Exited river zone (e.g. after hitObstacle reset)
    bv.state = 'run';
    bv.y = GROUND - BV_H*CELL;
  }

  // River crossing logic
  if (riverActive && bv.state === 'swim' && currentRiver) {
    bv._riverDecay++;
    riverTimer++;

    if (riverAlternate > 0) {
      // Good stroke — advance and reset drown timer
      bv._swimProgress += 14;
      bv._riverDecay   = 0;
      lastStrokeFrame  = frame;
      riverAlternate   = 0;

      // Crossed? Set visual offset so beaver slides smoothly back to x=80
      if (bv._swimProgress >= currentRiver.w) {
        // bvVisualOffset records how far right the beaver appeared visually;
        // it decays each frame, pulling the world forward at the same rate —
        // no instant jump, just a smooth run-out.
        bvVisualOffset = (currentRiver.x + currentRiver.w) - bv.x;
        currentRiver.passed = true;
        currentRiver = null;
        bv.state     = 'run';
        bv.y         = GROUND - BV_H*CELL;
        bv._riverDecay   = 0;
        bv._swimProgress = 0;
        riverActive  = false;
        riverTimer   = 0;
        worldPaused  = false;
      }
    }

    // At surface when swimming well; sinks linearly after 20 idle frames
    // Full sink at decay=140 (2s of "FASTER" display) — then lose a life
    const sinkRatio = Math.min(Math.max(0, bv._riverDecay - 20) / 120, 1);
    bv.y = GROUND - 14*CELL + Math.floor(sinkRatio * 12*CELL);

    // Lose a life after 2 seconds showing FASTER (decay 20→140)
    if (bv._riverDecay > 140) {
      hitObstacle();
      bv._riverDecay = 0;
      riverTimer     = 0;
    }
  } else if (!riverActive) {
    bv._riverDecay   = 0;
    bv._swimProgress = 0;
  }

  if (bv.invincible > 0) bv.invincible--;

  // ── Tail-stroke splash detection (phase 2 = horizontal/power stroke) ──
  if (bv.state === 'swim' && riverActive) {
    const sp  = Math.floor(frame / 8) % 4;
    const psp = Math.floor((frame - 1) / 8) % 4;
    if (sp === 2 && psp !== 2 && bv._riverDecay <= 20) lastTailStroke = frame;
  }

  // ── Post-river slide: world catches up as beaver glides back to x=80 ──
  let extraScroll = 0;
  if (bvVisualOffset > 0) {
    const step = Math.min(bvVisualOffset, speed); // pay back at most 1× speed/frame
    bvVisualOffset = Math.max(0, bvVisualOffset - step);
    extraScroll = step;
  }

  // ── Obstacle update ──
  for (let i = obstacles.length-1; i >= 0; i--) {
    const o = obstacles[i];

    if (!worldPaused) o.x -= speed + extraScroll;

    if (o.type === 'fir') {
      if (o.falling) {
        o.fallAngle += 0.065;
        if (o.fallAngle >= Math.PI/2) { o.done = true; o.fallAngle = Math.PI/2; }
      }
      if (o.done && o.x < -60) { obstacles.splice(i,1); continue; }
      if (!o.falling && !o.chomping && !o.done) {
        const firRect = { x: o.x + 3*CELL, y: o.y, w: 8*CELL, h: FIR_H*CELL };
        if (overlap(beaverRect(), firRect)) hitObstacle();
      }
      if (!o.falling && !o.chomping && o.x < -30) { obstacles.splice(i,1); continue; }
    }

    if (o.type === 'log') {
      const logRect = { x: o.x, y: o.y, w: 22*CELL, h: LOG_H*CELL };
      if (bv.state !== 'jump' && overlap(beaverRect(), logRect)) hitObstacle();
      if (o.x < -90) obstacles.splice(i,1);
    }

    if (o.type === 'river') {
      if (o.x + o.w < 0) { obstacles.splice(i,1); continue; }
      if (!o.passed && o.x + o.w < bv.x) { o.passed = true; score += 20; }
    }
  }

  // ── Clouds & grass ──
  if (!worldPaused) {
    for (const c of clouds) {
      c.x -= c.speed + extraScroll * (c.speed / speed);
      if (c.x < -60) { c.x = W+20; c.y = 18 + Math.random()*55; }
    }
    for (const g of grassTufts) {
      g.x -= speed + extraScroll;
      if (g.x < -20) g.x = W + Math.random()*40;
    }
  }

  // ── Level completion ──
  const thresholds = [1800, 2400, 3000];
  if ((score - levelStartScore) >= thresholds[level-1] && gameState === 'playing') {
    if (level < 3) { level++; gameState = 'levelIntro'; showLevelIntro(level); }
    else           { gameState = 'win'; showWin(); }
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.fillStyle = FG;
  ctx.fillRect(0, GROUND,   W, 3);
  ctx.fillRect(0, GROUND+3, W, 2);

  // Clouds
  for (const c of clouds) drawCloud(ctx, c.x, c.y);

  // Grass tufts
  for (const g of grassTufts) drawGrass(ctx, g.x, GROUND - CELL);

  // Obstacles (back to front)
  for (const o of obstacles) {
    if (o.type === 'river') drawRiver(ctx, o.x, o.w, waveOffset);
    if (o.type === 'log')   drawLog(ctx, o.x, o.y);
    if (o.type === 'fir')   drawFir(ctx, o.x, o.y, o.falling, o.fallAngle);
  }

  // Beaver visual x: moves through river when swimming, then slides back to x=80
  const bvDrawX = (bv.state === 'swim' && currentRiver)
    ? currentRiver.x + bv._swimProgress
    : bv.x + bvVisualOffset;

  // Beaver (blink when invincible)
  if (bv.invincible === 0 || Math.floor(bv.invincible/6) % 2 === 0) {
    drawBeaver(ctx, bvDrawX, bv.y, frame, bv.state);
  }

  // "CHOMP" label during bite
  if (bv.state === 'bite') {
    const chewPhase = Math.floor(frame / 10) % 2;
    if (chewPhase === 1) {
      ctx.fillStyle = FG;
      ctx.font = 'bold 11px "Silkscreen", monospace';
      ctx.fillText('CHOMP!', bv.x - 12, bv.y - 6);
    }
  }

  // River swim: text warning + upward water splash
  if (riverActive && bv.state === 'swim') {
    ctx.fillStyle = FG;
    ctx.font = 'bold 12px "Silkscreen", monospace';
    if (bv._riverDecay > 90) {
      ctx.fillText('SWIM!!!', bvDrawX - 16, bv.y - 6);
    } else if (bv._riverDecay > 20) {
      ctx.fillText('FASTER', bvDrawX - 14, bv.y - 6);
    }

    // Upward splash when tail hits horizontal (power stroke)
    const splashAge = frame - lastTailStroke;
    if (splashAge < 18) {
      ctx.fillStyle = FG;  // dark drops on yellow sky — visible above waterline
      const sx = bvDrawX + 1*CELL;   // tail x (left side of beaver)
      const sy = bv.y + 7*CELL;      // water surface level
      if (splashAge < 5) {
        // Large upward burst
        ctx.fillRect(sx - 10, sy - 16, 2, 8);
        ctx.fillRect(sx -  5, sy - 20, 2, 10);
        ctx.fillRect(sx,      sy - 14, 2, 7);
        ctx.fillRect(sx +  5, sy - 10, 2, 5);
        ctx.fillRect(sx - 15, sy - 10, 2, 5);
      } else if (splashAge < 11) {
        // Mid-phase: drops arcing
        ctx.fillRect(sx - 12, sy - 12, 2, 3);
        ctx.fillRect(sx -  5, sy - 16, 2, 4);
        ctx.fillRect(sx +  2, sy - 10, 2, 3);
        ctx.fillRect(sx - 18, sy -  8, 2, 2);
      } else {
        // Final specks falling back
        ctx.fillRect(sx -  8, sy -  8, 2, 2);
        ctx.fillRect(sx -  2, sy -  6, 2, 2);
        ctx.fillRect(sx +  4, sy -  5, 2, 2);
      }
    }
  }

  // Floating hearts (life lost)
  ctx.font = '14px "Silkscreen", monospace';
  for (const h of floatingHearts) {
    ctx.globalAlpha = Math.max(0, 1 - h.t / 120);
    ctx.fillStyle = FG;
    ctx.fillText('❤', h.x, h.y);
  }
  ctx.globalAlpha = 1;
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
function loop() { update(); render(); requestAnimationFrame(loop); }

gameState = 'title';
showTitle();
loop();
</script>
</body>
